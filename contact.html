  <header class="site-header">

      <a href="index.html" class="brand">
        <img src="fox2e_logo.png" alt="Fox2E Studio">
        <span>Fox2E&nbsp;Studio</span>
      </a>
      <nav class="nav">

  <div class="page-title">
    <div class="container">
      <h1>お問い合わせ</h1>
      <p>Contact</p>
    </div>
  </div>

  <section class="section">
    <div class="container">
      <p class="muted" style="max-width:560px;">
        特許やサービスに関するご相談など、下記フォームよりお気軽にお問い合わせください。
      </p>
      <form class="form" action="https://formspree.io/f/mrbannnn" method="POST">
        <label>お名前
          <input type="text" name="name" required>
        </label>
        <label>会社・組織名
          <input type="text" name="organization" required>
        </label>
        <label>ご連絡先（メールまたは電話番号）
          <input type="text" name="contact" required>
        </label>
        <label>お問い合わせ内容
          <textarea name="message" rows="6" required></textarea>
        </label>
        <button type="submit" class="btn">送信する</button>
      </form>
    </div>
  </section>

  <footer class="site-footer">
    <div class="container">
      <div class="foot-brand">Fox2E Studio</div>
      <div>&copy; 2025 Fox2E Studio. All rights reserved.</div>
    </div>
